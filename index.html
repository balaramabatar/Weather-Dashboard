<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="card">
        <h2>Weather Dashboard</h2>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button onclick="checkWeather()">Search</button>
        </div>
        
        <div class="weather-info" id="weatherInfo" style="display: none;">
            <div class="current-weather">
                <h3 id="cityName">City</h3>
                <p id="temp">Temperature: --°C</p>
                <p id="description">Condition: --</p>
                <p id="humidity">Humidity: --%</p>
            </div>
            
            <div id="map"></div>
            
            <div class="chart-container">
                <canvas id="forecastChart"></canvas>
            </div>
        </div>
        
        <p id="error" style="color: red; display: none;">City not found. Please try again.</p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
