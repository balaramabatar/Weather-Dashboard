<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Pro: Master Edition</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
</head>
<body class="initial-state">
    <div id="tsparticles"></div>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Recent History</h3>
            <button onclick="toggleSidebar()" class="close-btn">×</button>
        </div>
        <ul id="recentList"></ul>
    </div>

    <div id="welcome-screen">
        <h1 class="welcome-text">Welcome, Souvik</h1>
        <p class="sub-text">Monitor the global atmosphere in real-time.</p>
    </div>

    <div class="nav-container">
        <div class="nav-left">
            <button onclick="toggleSidebar()" class="icon-btn" title="Recent History">📜</button>
            <div class="search-wrapper">
                <input type="text" id="cityInput" placeholder="Search city (Enter)..." autocomplete="off">
                <button onclick="checkWeather()" id="searchBtn">Search</button>
            </div>
        </div>

        <div class="controls-wrapper">
            <button id="themeToggle" class="icon-btn">🌙</button>
            <button onclick="getLocation()" class="icon-btn">📍</button>
        </div>
    </div>

    <main class="dashboard-content" id="weatherInfo" style="display: none;">
        <div class="loader" id="loadingSpinner"></div>
        
        <div class="card" data-tilt>
            <div class="current-weather animate-in delay-1">
                <h3 id="cityName">City</h3>
                <div class="stats-grid">
                    <p id="temp">--°C</p>
                    <div class="sub-stats">
                        <p id="description">Condition</p>
                        <p id="humidity">Humidity: --%</p>
                    </div>
                </div>
            </div>

            <div class="detailed-stats animate-in delay-2">
                <div class="stat-item">
                    <span class="stat-icon">💨</span>
                    <div class="stat-info">
                        <p class="stat-label">Wind</p>
                        <p id="windSpeed">-- m/s</p>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🌅</span>
                    <div class="stat-info">
                        <p class="stat-label">Sunrise</p>
                        <p id="sunriseTime">--:--</p>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🌡️</span>
                    <div class="stat-info">
                        <p class="stat-label">Feels Like</p>
                        <p id="feelsLike">--°C</p>
                    </div>
                </div>
            </div>
            
            <div id="map" class="animate-in delay-2"></div>
            
            <div class="chart-container animate-in delay-3">
                <canvas id="forecastChart"></canvas>
            </div>
        </div>
    </main>

    <div id="error" class="error-toast" style="display: none;">
        Location not found. Please try again.
    </div>

    <script src="script.js"></script>
</body>
</html>
